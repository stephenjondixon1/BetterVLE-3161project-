services:
  # ---------- Backend API (Docker) ----------
  - type: web
    name: api
    runtime: image
    repo: https://github.com/stephenjondixon1/BetterVLE-3161project-.git
    plan: free  
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_HOST
        value: db  # internal hostname of the database service
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        value: root
      - key: DB_PASSWORD
        value: root
      - key: DB_NAME
        value: betterVLE
      - key: PORT
        value: "3000"
    healthCheckPath: / 
    numInstances: 1

  # ---------- MySQL Database (Private Service) ----------
  - type: private
    name: db
    runtime: image
    repo: https://github.com/stephenjondixon1/BetterVLE-3161project-.git
    plan: free
    dockerfilePath: ./db/Dockerfile   # see note below
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        value: root
      - key: MYSQL_DATABASE
        value: betterVLE
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10 

  # ---------- Frontend (Static Site) ----------
  - type: static
    name: frontend
    repo: https://github.com/stephenjondixon1/BetterVLE-3161project-.git
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist   
    envVars:
      - key: VITE_API_URL
        value: https://api.onrender.com   
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache